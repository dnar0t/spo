# ============================================
# СПО — Production Docker Compose
# ============================================
# Version: 1.0.0
#
# Usage:
#   docker compose -f docker/docker-compose.prod.yml up -d
#
# Prerequisites:
#   - Create .env file with all required environment variables
#   - Set up SSL certificates for Nginx
#   - Ensure Docker and Docker Compose are installed
# ============================================

version: '3.8'

# ============================================
# Networks
# ============================================
networks:
  frontend:
    driver: bridge
    name: spo-frontend-network
  backend:
    driver: bridge
    name: spo-backend-network
    internal: true  # Backend network is not exposed externally

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
    name: spo-postgres-data
  postgres_backups:
    driver: local
    name: spo-postgres-backups
  redis_data:
    driver: local
    name: spo-redis-data
  backend_exports:
    driver: local
    name: spo-backend-exports
  nginx_ssl:
    driver: local
    name: spo-nginx-ssl
  nginx_logs:
    driver: local
    name: spo-nginx-logs

# ============================================
# Services
# ============================================
services:

  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: spo-postgres
    restart: unless-stopped
    networks:
      - backend
    environment:
      POSTGRES_USER: ${DB_USER:-spo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-spo}
      TZ: UTC
    ports:
      - "127.0.0.1:5432:5432"  # Only accessible from localhost for direct connections
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-spo} -d ${DB_NAME:-spo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_size=1GB"
      - "-c"
      - "min_wal_size=80MB"

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: spo-redis
    restart: unless-stopped
    networks:
      - backend
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--save"
      - "900 1"
      - "--save"
      - "300 10"
      - "--save"
      - "60 10000"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ---- Backend (NestJS) ----
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: spo-backend:latest
    container_name: spo-backend
    restart: unless-stopped
    networks:
      - backend
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      HOST: 0.0.0.0

      # Database
      DATABASE_URL: postgresql://${DB_USER:-spo}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/${DB_NAME:-spo}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}

      # YouTrack Integration
      YOUTRACK_BASE_URL: ${YOUTRACK_BASE_URL:-}
      YOUTRACK_API_TOKEN: ${YOUTRACK_API_TOKEN:-}

      # Email / SMTP
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@spo.example.com}

      # LDAP
      LDAP_URL: ${LDAP_URL:-}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_CREDENTIALS: ${LDAP_BIND_CREDENTIALS:-}

      # Export
      EXPORT_STORAGE_PATH: /app/exports
      EXPORT_BASE_URL: /api/export/download

      # Retention
      RETENTION_EXPORT_DAYS: ${RETENTION_EXPORT_DAYS:-1}
      RETENTION_NOTIFICATION_DAYS: ${RETENTION_NOTIFICATION_DAYS:-90}
      RETENTION_AUDIT_DAYS: ${RETENTION_AUDIT_DAYS:-365}
      RETENTION_SYNC_LOG_DAYS: ${RETENTION_SYNC_LOG_DAYS:-90}
      RETENTION_LOGIN_ATTEMPT_DAYS: ${RETENTION_LOGIN_ATTEMPT_DAYS:-90}

      # Rate Limiting
      THROTTLE_TTL: ${THROTTLE_TTL:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-10}

      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-https://spo.example.com}
    volumes:
      - backend_exports:/app/exports
    ports:
      - "127.0.0.1:3000:3000"  # Only accessible via Nginx reverse proxy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:1.25-alpine
    container_name: spo-nginx
    restart: unless-stopped
    networks:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites:/etc/nginx/sites:ro
      - nginx_ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Backup Job (optional, runs on schedule) ----
  backup:
    image: postgres:16-alpine
    container_name: spo-backup
    restart: "no"
    networks:
      - backend
    volumes:
      - ./backups:/backups
      - postgres_backups:/backups/db
    entrypoint: >
      sh -c "
        echo '0 2 * * * /backups/backup.sh >> /backups/backup.log 2>&1' > /etc/crontabs/root &&
        crond -f -l 2
      "
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-spo}
      DB_USER: ${DB_USER:-spo}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      BACKUP_DIR: /backups/db
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
