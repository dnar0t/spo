# ============================================
# СПО — SSL Configuration Parameters
# ============================================
# Modern, secure SSL/TLS configuration for nginx.
# Based on Mozilla SSL Configuration Generator (Intermediate profile).
# ============================================

# ─── SSL Session Cache ───
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;
ssl_session_tickets off;

# ─── SSL Protocols ───
# Allow TLS 1.2 and 1.3 only (disable SSLv3, TLSv1.0, TLSv1.1)
ssl_protocols TLSv1.2 TLSv1.3;

# ─── SSL Ciphers ───
# Modern, secure cipher suite (Intermediate compatibility)
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

# ─── Prefer Server Cipher Order ───
ssl_prefer_server_ciphers on;

# ─── DH Parameters ───
# Generate with: openssl dhparam -out /etc/ssl/certs/dhparam.pem 2048
# ssl_dhparam /etc/ssl/certs/dhparam.pem;

# ─── OCSP Stapling ───
# Allows browsers to check certificate revocation status without
# contacting the CA directly, improving performance.
ssl_stapling on;
ssl_stapling_verify on;
resolver 8.8.8.8 1.1.1.1 valid=300s;
resolver_timeout 5s;

# ─── SSL Buffer Size ───
ssl_buffer_size 4k;

# ─── Early Data (0-RTT) ───
# Disable by default; enable only if application is idempotent-safe
ssl_early_data off;
