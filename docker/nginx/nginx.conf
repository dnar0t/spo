# ============================================
# СПО — Nginx Production Configuration
# ============================================
# HTTPS termination, reverse proxy to backend,
# rate limiting, security headers, static files.
# ============================================

# ---- User and Process Settings ----
user nginx;
worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

# ---- Events ----
events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

# ---- HTTP ----
http {
    # ─── Basic Settings ───
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ───
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    # ─── Performance Tuning ───
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_header_timeout 20s;
    client_body_timeout 20s;
    send_timeout 10s;
    reset_timedout_connection on;
    server_tokens off;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # ─── Gzip Compression ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/x-javascript
        application/xhtml+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ─── Rate Limiting Zones ───
    # Define rate limiting zones (shared memory)
    # General API: 100 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    # Auth endpoint: 10 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    # Export endpoint: 5 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=export_limit:10m rate=5r/m;
    # Login attempts: 5 requests per minute per IP (stricter)
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # ─── Upstream Backend ───
    upstream backend {
        # Least connections balancing
        least_conn;
        # Backend server running on port 3000
        server 127.0.0.1:3000 max_fails=5 fail_timeout=30s;
        # Add additional servers for horizontal scaling:
        # server backend2:3000 max_fails=5 fail_timeout=30s;
        keepalive 32;
    }

    # ─── HTTPS Server (Production) ───
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name spo.company.com;

        # ─── SSL Configuration ───
        # Include SSL parameters from ssl-params.conf
        include /etc/nginx/ssl-params.conf;

        # SSL Certificate paths (replace with actual cert paths)
        # ssl_certificate /etc/ssl/certs/spo.company.com.crt;
        # ssl_certificate_key /etc/ssl/private/spo.company.com.key;
        # ssl_trusted_certificate /etc/ssl/certs/spo.company.com.ca-bundle;

        # ─── Security Headers ───
        # HSTS (HTTP Strict Transport Security)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Prevent MIME type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # Prevent clickjacking
        add_header X-Frame-Options "DENY" always;

        # Enable XSS filter in browsers
        add_header X-XSS-Protection "1; mode=block" always;

        # Referrer policy
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Permissions Policy (disable features)
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

        # Content Security Policy
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self';
            style-src 'self' 'unsafe-inline';
            img-src 'self' data:;
            font-src 'self';
            connect-src 'self';
            frame-ancestors 'none';
            form-action 'self';
            base-uri 'self';
        " always;

        # Cache control for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;

        # ─── Logging ───
        access_log /var/log/nginx/spo-access.log main;
        error_log /var/log/nginx/spo-error.log warn;

        # ─── Health Check Endpoint (no rate limit) ───
        location = /api/health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 10s;
        }

        # ─── Auth Endpoints (rate limited) ───
        location ^~ /api/auth/ {
            # Rate limiting: 10 req/min
            limit_req zone=auth_limit burst=5 nodelay;

            # Stricter limit for login specifically
            location ~ ^/api/auth/login$ {
                limit_req zone=login_limit burst=3 nodelay;
                proxy_pass http://backend;
            }

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # ─── Export Endpoints (rate limited) ───
        location ^~ /api/export/ {
            limit_req zone=export_limit burst=2 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;  # Longer timeout for exports
            proxy_connect_timeout 5s;
        }

        # ─── API Endpoints (general rate limit) ───
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;

            # Do not buffer responses for streaming endpoints
            proxy_buffering off;
        }

        # ─── Static Files (Export Downloads) ───
        location /exports/ {
            alias /var/spo/exports/;
            internal;  # Only accessible via internal redirect (X-Accel-Redirect)
            add_header Content-Disposition "attachment";
            add_header Cache-Control "private, max-age=3600";
        }

        # ─── Root Redirect to API docs ───
        location / {
            return 302 /api/health;
        }

        # ─── Deny access to hidden files ───
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ─── Deny access to sensitive paths ───
        location ~ /(node_modules|\.env|\.git|dist) {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ─── HTTP → HTTPS Redirect ───
    server {
        listen 80;
        listen [::]:80;
        server_name spo.company.com;

        # Rate limiting on HTTP as well to prevent abuse
        limit_req zone=api_limit burst=20 nodelay;

        # Redirect all HTTP traffic to HTTPS
        return 301 https://$server_name$request_uri;

        access_log /var/log/nginx/spo-http-redirect.log;
    }

    # ─── Development HTTP Server (no SSL) ───
    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        # ─── Rate Limiting ───
        limit_req zone=api_limit burst=20 nodelay;

        # ─── Dev Security Headers (relaxed) ───
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        server_tokens off;

        # ─── Logging ───
        access_log /var/log/nginx/spo-dev-access.log main;
        error_log /var/log/nginx/spo-dev-error.log warn;

        # ─── Health Check ───
        location = /api/health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── API Proxy ───
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;

            # CORS headers for dev
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        }

        # ─── Root ───
        location / {
            return 302 /api/health;
        }
    }
}
